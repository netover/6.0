model_list:
- model_name: qwen-local
  litellm_params:
    model: ollama/qwen2.5:3b
    api_base: http://localhost:11434
    temperature: 0.1
    max_tokens: 512
    num_ctx: 4096
    timeout: 8
    stream: true
- model_name: qwen-large
  litellm_params:
    model: ollama/qwen2.5:7b
    api_base: http://localhost:11434
    temperature: 0.2
    max_tokens: 1024
    num_ctx: 4096
    timeout: 15
- model_name: llama-local
  litellm_params:
    model: ollama/llama3.2:3b
    api_base: http://localhost:11434
    temperature: 0.1
    max_tokens: 512
    num_ctx: 4096
    timeout: 8
- model_name: gpt-fallback
  litellm_params:
    model: gpt-4o-mini
    api_key: os.environ/OPENAI_API_KEY
    temperature: 0.1
    max_tokens: 1024
    timeout: 30
- model_name: gpt-cheap
  litellm_params:
    model: gpt-3.5-turbo
    api_key: os.environ/OPENAI_API_KEY
    temperature: 0.1
    max_tokens: 1024
    timeout: 30
- model_name: openrouter-free
  litellm_params:
    model: openrouter/meta-llama/llama-3.2-3b-instruct:free
    api_key: os.environ/OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1
    temperature: 0.1
    max_tokens: 1024
    timeout: 30
- model_name: openrouter-default
  litellm_params:
    model: openrouter/free
    api_key: os.environ/OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1
    temperature: 0.1
    max_tokens: 2048
    timeout: 30
model_aliases:
  tws-default: openrouter-default
  tws-intent: openrouter-default
  tws-json: openrouter-default
  tws-reasoning: openrouter-default
  tws-troubleshooting: openrouter-default
  tws-fallback: openrouter-free
  tws-cheap: openrouter-free
  liteLLM-default: openrouter-default
router_settings:
  model_group_alias:
  - group_name: tws-general
    list_of_model_names:
    - openrouter-default
    - openrouter-free
    - gpt-fallback
    - gpt-cheap
  - group_name: tws-troubleshooting
    list_of_model_names:
    - openrouter-default
    - openrouter-free
    - gpt-fallback
    - gpt-cheap
  - group_name: tws-research
    list_of_model_names:
    - openrouter-default
    - openrouter-free
    - gpt-fallback
  fallbacks:
  - type: model
    fallbacks:
    - gpt-fallback
    - gpt-cheap
    - openrouter-free
  timeout: 8
  stream_timeout: 60
  num_retries: 1
  retry_after: 0.5
general_settings:
  cache:
    type: valkey
    host: os.environ/VALKEY_URL
    enabled: true
    ttl: 3600
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  set_verbose: false
environment_variables:
  OLLAMA_HOST: http://localhost:11434
  OLLAMA_NUM_PARALLEL: '1'
  OLLAMA_MAX_LOADED_MODELS: '1'
  OLLAMA_FLASH_ATTENTION: '1'
  OLLAMA_KV_CACHE_TYPE: q8_0
